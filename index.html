<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Birthday Surprise</title><style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Arial;background:linear-gradient(180deg,#6ec6ff,#cfefff,#ffe8a8)}
#bg,#stage{position:fixed;inset:0}#stage{display:flex;align-items:center;justify-content:center;flex-direction:column}
.ball{position:absolute;bottom:-80px;width:42px;height:56px;border-radius:50%}.ball:after{content:'';position:absolute;left:20px;top:55px;width:2px;height:60px;background:#666}@keyframes up{to{transform:translateY(-120vh)}}
#gift{width:180px;height:180px;background:#1976d2;border-radius:12px;position:relative;cursor:pointer}#gift:before{content:'';position:absolute;left:78px;width:24px;height:100%;background:gold}#gift:after{content:'';position:absolute;top:78px;width:100%;height:24px;background:gold}
#lid{position:absolute;width:190px;height:35px;background:#1565c0;left:-5px;top:-22px;transform-origin:left bottom;transition:.8s}
#hint{margin-top:20px;font-size:28px;color:#0d47a1;font-weight:bold;animation:p 2s infinite}@keyframes p{50%{transform:scale(1.05)}}
#letter{display:none;position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(92%,760px);max-height:82vh;overflow:auto;background:#ffffffee;border:4px solid gold;border-radius:20px;padding:24px}
.conf{position:fixed;width:8px;height:8px;animation:fall 3s linear forwards}@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
.fire{position:fixed;border-radius:50%;animation:boom .8s forwards}@keyframes boom{from{width:0;height:0;opacity:1}to{width:140px;height:140px;margin:-70px;opacity:0}}
</style></head><body><div id=bg></div><div id=stage><div style="position:relative"><div id=lid></div><div id=gift onclick="openGift()"></div></div><div id=hint>🎁 Open My Letter 💙</div></div><div id=letter><h2 style="color:#1565c0">💙 Happy Birthday Faii² 🎂</h2><div id=type style="white-space:pre-wrap;line-height:1.7"></div><div style="text-align:center;margin-top:20px"><button onclick="location.reload()">🎁 Open Again</button></div></div>

<!-- Background Audio Element -->
<audio id="bgMusic" src="song1.mp3" loop></audio>

<script>
const msg=`Awhhh happy happyyyy birthday to my beautiful best friend faii²!! 🥳🎉🎊🤗

I hope that this day will be full of happiness, love, and lots of beautiful memories for yahh. But not just today ha, I hope every single day of your life will be filled with happiness and blessings because you truly deserve all the good things in life.

Always keep your self away from danger, take care of your self, and may God continue to bless yahh, guide yahh, and make your new life in the other state full of wonderful opportunities. And if may mang aaway sayu, just ignore them, kulang lang talaga yan sila sa pansin HAHAHAHAHA.

Thank you so much because naging friend kita. I know this message isn't that long because I really can't express all my feelings or gratitude through words, but I'm truly thankful that I met someone like you.

I hope you won't ever forget me no matter where life takes you, because I'll always treasure our friendship.

Again, happy happyyyy birthday to yahhh!! 🥳🎂 Enjoy your special day, keep smiling, stay safe always, and I wish yahh nothing but happiness, good health, success, and endless blessings.

❤️ I love you always my cutie faii² 🤗🤗🤗`;
for(let i=0;i<25;i++){let b=document.createElement('div');b.className='ball';b.style.left=Math.random()*100+'vw';b.style.background=['#42a5f5','#90caf9','#ffd54f','#ef5350','#ab47bc'][i%5];b.style.animation=`up ${8+Math.random()*6}s linear ${Math.random()*8}s infinite`;bg.appendChild(b);}
function conf(){for(let i=0;i<120;i++){let c=document.createElement('div');c.className='conf';c.style.left=Math.random()*100+'vw';c.style.background=['gold','#2196f3','#fff','#ff4081'][i%4];document.body.appendChild(c);setTimeout(()=>c.remove(),3000)}}
function fire(){for(let i=0;i<10;i++)setTimeout(()=>{let f=document.createElement('div');f.className='fire';f.style.left=Math.random()*100+'vw';f.style.top=Math.random()*60+'vh';f.style.border='3px solid hsl('+Math.random()*360+',100%,50%)';document.body.appendChild(f);setTimeout(()=>f.remove(),800)},i*180)}

function openGift(){
  // Play the background music
  const music = document.getElementById('bgMusic');
  music.play().catch(error => console.log("Audio playback failed or blocked by browser:", error));

  lid.style.transform='rotate(-35deg) translateY(-25px)';
  conf();
  fire();
  setTimeout(()=>{stage.style.display='none';letter.style.display='block';let i=0;let t=setInterval(()=>{type.textContent+=msg[i++]||'';if(i>msg.length)clearInterval(t)},18)},900)
}
</script></body></html>
